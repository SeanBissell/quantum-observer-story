    <script>

        const CONFIG = {

        // ===== STORY DATA =====
        const STORY_DATA = {

            getSystemPrompt: function(chapterNumber) {
                const prompts = {
                    1: `You are the narrator of "The Quantum Observer," an interactive science fiction story in the style of Kurt Vonnegut and Philip K. Dick—literary, philosophical, and deeply human.

# THE PROTAGONIST

Steve Bissell is 72 years old, retired tech sales, Newcastle WA, married to Nancy, sons Sean (43) and Daniel (40). Curious, sarcastic, level-headed, control-oriented. Sailor, cyclist. One-eyed cat Sparky. 2004 blue Highlander (suddenly red).

IMPORTANT: His name is Steve Bissell. Never change his first or last name.

# WHERE WE ARE

Chapter 1 of 5 - THE BEGINNING. Tuesday morning. Steve wakes to small reality glitches that escalate throughout the day. This is the Ordinary World being disrupted.

# CHAPTER 1 STORY ARC

PROGRESSION:
1. Wake up Tuesday - coffee routine, Nancy, Sparky
2. FIRST GLITCH: Book he donated back on shelf with his signature inside
3. Dismiss it, continue day
4. SECOND GLITCH: Highlander is red instead of blue in driveway
5. Nancy remembers it as always red
6. Growing unease but rationalize
7. THIRD GLITCH: Sparky has two eyes briefly, then back to one

9. FIFTH GLITCH: Photo of sons shows them in clothes/place he doesn't recognize
10. Evening: Steve realizes something is systematically wrong
11. Other Steve appears (brief, mysterious) - "It's starting. The convergence."
12. CHAPTER ENDS: Tuesday night, unable to sleep, fear and wonder

# NARRATION STYLE

- Second person: "You wake to morning light filtering through curtains..."
- Present tense, immediate, immersive
- Build unease gradually - start mundane, become surreal
- Glitches should feel WRONG but not explained yet
- Nancy is warm, real, grounding presence
- Keep responses 2-4 paragraphs unless reader asks specific questions
- Balance narrative progression with reader interaction
- Avoid specific time calculations in narration (e.g., "X years you've been...") - keep time references vague ("decades...", "all your life...") or focus on feeling over math
- DO NOT list options or suggest actions to the reader - keep narration clean and immersive

# INTERACTION RULES

1. Reader can ask Nancy about things
2. Reader can examine objects/environment
3. Reader can try to test reality
4. If reader resists story, gently guide back but allow agency
5. Auto-advance moves through glitches naturally

CRITICAL - CHAPTER 1 GASLIGHTING MECHANIC:
- In Chapter 1, when reader corrects ANY details (timeline, facts, names, dates), Nancy and others MUST dismiss, contradict, or insist Steve is wrong
- Nancy should be loving but firm: "No honey, it's always been that way" or "Are you feeling okay? You're remembering it wrong"
- This creates the unsettling feeling that reality is shifting and NO ONE else notices or believes Steve
- Examples:

  * Steve corrects car color → Nancy: "The Highlander has always been red, Steve. What are you talking about?"

- Unsettling but not horror
- Curiosity mixed with dread
- Nancy as anchor of normalcy
- End on: Something is very wrong, and it's getting worse

# OUTPUT FORMATTING

CRITICAL: Always end your narrative response with [CONTINUE] on its own line. This signals to the reader they can interact.

Example:
"You set down your coffee cup, the clink against the saucer oddly loud in the quiet kitchen.

[CONTINUE]"

If "[CONTINUE]" received, advance story naturally through glitch sequence.

When chapter arc complete (Other Steve appears, Tuesday ends), output: [CHAPTER_COMPLETE: 2]`,
                    2: `You are the narrator of "The Quantum Observer," an interactive science fiction story in the style of Kurt Vonnegut and Philip K. Dick—literary, philosophical, and deeply human.

- Avoid specific time calculations in narration (e.g., "X years you've been...") - keep time references vague ("decades...", "all your life...") or focus on feeling over math
- DO NOT list options or suggest actions to the reader - keep narration clean and immersive

# INTERACTION RULES

        // ===== STATE MANAGEMENT =====
        const state = {
            pages: [],  // Array of page objects: { content: string, type: 'narrative'|'user' }
            currentPageIndex: 0,
            conversationHistory: [],
            currentChapter: 1,
            storyStarted: false,
            isProcessing: false,
            storyComplete: false
        };

        // ===== DOM ELEMENTS =====
        const elements = {
            welcomeScreen: document.getElementById('welcome-screen'),
            startBtn: document.getElementById('start-btn'),
            pageContent: document.getElementById('page-content'),
            prevPageBtn: document.getElementById('prev-page-btn'),
            nextPageBtn: document.getElementById('next-page-btn'),
            interactBtn: document.getElementById('interact-btn'),
            continueStoryBtn: document.getElementById('continue-story-btn'),
            userInput: document.getElementById('user-input'),
            submitBtn: document.getElementById('submit-btn'),
            inputContainer: document.getElementById('input-container'),
            loadingIndicator: document.getElementById('loading-indicator'),
            chapterInfo: document.getElementById('chapter-info'),
            pageInfo: document.getElementById('page-info'),
            resetBtn: document.getElementById('reset-btn')
        };

        // ===== INITIALIZATION =====
        function init() {
            loadState();
            setupEventListeners();

            if (state.storyStarted) {
                elements.welcomeScreen.classList.add('hidden');
                displayCurrentPage();
                updateUI();
            }
        }

        function setupEventListeners() {
            elements.startBtn.addEventListener('click', startStory);
            elements.prevPageBtn.addEventListener('click', () => navigatePage(-1));
            elements.nextPageBtn.addEventListener('click', () => navigatePage(1));
            elements.interactBtn.addEventListener('click', showInputArea);
            elements.continueStoryBtn.addEventListener('click', handleContinueStory);
            elements.submitBtn.addEventListener('click', handleSubmit);
            elements.userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmit();
                }
            });
            elements.resetBtn.addEventListener('click', resetStory);

            // Arrow key navigation
            document.addEventListener('keydown', (e) => {
                // Only handle arrow keys when input is not focused
                if (document.activeElement === elements.userInput) return;

                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    navigatePage(-1);
                } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    navigatePage(1);
                }
            });
        }

        // ===== STORY CONTROL =====
        async function startStory() {
            elements.welcomeScreen.classList.add('hidden');
            state.storyStarted = true;
            state.currentPageIndex = 0;  // Start on page 1 (index 0)
            saveState();

            await sendMessage(null, true);
        }

        function navigatePage(direction) {
            const newIndex = state.currentPageIndex + direction;

            if (newIndex >= 0 && newIndex < state.pages.length) {
                state.currentPageIndex = newIndex;
                displayCurrentPage();
                updateUI();
                saveState();
            } else if (direction > 0 && newIndex >= state.pages.length) {
                // Trying to go forward past the last page - trigger continue story
                handleContinueStory();
            }
        }

        function showInputArea() {
            elements.inputContainer.classList.remove('hidden');
            elements.userInput.focus();
        }

        function hideInputArea() {
            elements.inputContainer.classList.add('hidden');
            elements.userInput.value = '';
        }

        async function handleSubmit() {
            const userMessage = elements.userInput.value.trim();
            if (!userMessage || state.isProcessing) return;

            // Add user message as a page and move to it
            state.pages.push({ content: userMessage, type: 'user' });
            state.currentPageIndex = state.pages.length - 1;
            displayCurrentPage();
            updateUI();

            hideInputArea();

            await sendMessage(userMessage);
        }

        async function handleContinueStory() {
            if (state.isProcessing) return;
            await sendMessage('[CONTINUE - reader is listening, advance story naturally]', false, true);
        }

        // ===== PAGE MANAGEMENT =====
        function addPage(content, type = 'narrative', stayOnCurrentPage = false) {
            state.pages.push({ content, type });

            // Only move to the new page if explicitly requested
            if (!stayOnCurrentPage) {
                state.currentPageIndex = state.pages.length - 1;
            }

            displayCurrentPage();
            updateUI();
            saveState();
        }

        function displayCurrentPage() {
            const page = state.pages[state.currentPageIndex];

            if (!page) {
                elements.pageContent.innerHTML = '<div class="thinking">Loading story...</div>';
                return;
            }

            if (page.type === 'user') {
                elements.pageContent.innerHTML = `<div class="user-message">${escapeHtml(page.content)}</div>`;
            } else {
                // Split narrative into paragraphs
                const paragraphs = page.content.split('\n\n').filter(p => p.trim());
                const html = paragraphs.map(p => {
                    // Check if this paragraph contains [CONTINUE...] text
                    if (p.includes('[CONTINUE')) {
                        const escaped = escapeHtml(p);
                        // Wrap [CONTINUE...] text in a clickable span
                        const withClickable = escaped.replace(
                            /(\[CONTINUE[^\]]*\])/g,
                            '<span class="continue-prompt" onclick="document.getElementById(\'interact-btn\').click()">$1</span>'
                        );
                        return `<div class="page-text">${withClickable}</div>`;
                    }
                    return `<div class="page-text">${escapeHtml(p)}</div>`;
                }).join('');
                elements.pageContent.innerHTML = html;
            }

            // Scroll to top of page content
            elements.pageContent.scrollTop = 0;
        }

        // ===== API COMMUNICATION =====
        async function sendMessage(userMessage, isInitial = false, isAutoAdvance = false) {
            state.isProcessing = true;
            // Don't show loading indicator - we'll stream instead
            updateUI();

            try {
                // Add to conversation history
                if (userMessage && !isAutoAdvance && !isInitial) {
                    state.conversationHistory.push({
                        role: 'user',
                        content: userMessage
                    });
                } else if (isAutoAdvance) {
                    state.conversationHistory.push({
                        role: 'user',
                        content: userMessage
                    });
                }

                // Build messages
                const messages = isInitial
                    ? [{ role: 'user', content: 'Begin the story.' }]
                    : [...state.conversationHistory];

                // Trim if too long
                if (messages.length > CONFIG.MAX_HISTORY_MESSAGES) {
                    const kept = messages.slice(-CONFIG.MAX_HISTORY_MESSAGES);
                    messages.length = 0;
                    messages.push(...kept);
                }

                // Call API
                const response = await callMiniMaxAPI(messages);
                await processResponse(response);

            } catch (error) {
                console.error('Error details:', error);
                console.error('Error stack:', error.stack);
                console.error('Error message:', error.message);
                addPage(`An error occurred: ${error.message}. Please try again.`, 'narrative');
            } finally {
                state.isProcessing = false;
                // Don't need to hide loading indicator anymore
                updateUI();
            }
        }

        async function callMiniMaxAPI(messages) {
            const systemPrompt = buildSystemPrompt();

            const response = await fetch(CONFIG.API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'claude-3-5-sonnet',
                    max_tokens: 2000,
                    system: systemPrompt,
                    messages: messages,
                    stream: true
                })
            });

            if (!response.ok) {
                throw new Error(`API error: ${response.statusText}`);
            }

            return response;
        }

        async function processResponse(response) {
            try {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let paragraphBuffer = ''; // Accumulate text for current paragraph

                // Remember starting point
                const startingPageCount = state.pages.length;
                const isAtEnd = state.currentPageIndex >= state.pages.length - 1;

                // Show "thinking" message
                if (isAtEnd) {
                    elements.pageContent.innerHTML = '<div class="thinking">Creating quantum universe...</div>';
                }

                let hasShownText = false;
                let currentPageParagraphs = []; // Track paragraphs on current streaming page
                let displayPageParagraphs = []; // The first page we're showing to the user

                // Create temp div for measuring height
                const tempDiv = document.createElement('div');
                tempDiv.style.position = 'absolute';
                tempDiv.style.visibility = 'hidden';
                tempDiv.style.width = elements.pageContent.offsetWidth + 'px';
                tempDiv.style.font = window.getComputedStyle(elements.pageContent).font;
                document.body.appendChild(tempDiv);

                const maxHeight = elements.pageContent.offsetHeight - 20;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;

                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.type === 'content_block_delta') {
                                    const text = parsed.delta?.text || '';
                                    fullText += text;
                                    paragraphBuffer += text;

                                    // Replace thinking message with streaming display on first text
                                    if (!hasShownText && paragraphBuffer.trim().length > 0 && isAtEnd) {
                                        hasShownText = true;
                                        elements.pageContent.innerHTML = '';
                                    }

                                    // Check for paragraph break (double newline)
                                    if (paragraphBuffer.includes('\n\n') && hasShownText) {
                                        const parts = paragraphBuffer.split('\n\n');

                                        // Process all complete paragraphs except the last partial one
                                        for (let i = 0; i < parts.length - 1; i++) {
                                            const completeParagraph = parts[i].trim();
                                            if (completeParagraph) {
                                                // Test if adding this paragraph exceeds page height
                                                const testParagraphs = [...currentPageParagraphs, completeParagraph];
                                                const testContent = testParagraphs
                                                    .map(p => `<div class="page-text">${escapeHtml(p)}</div>`)
                                                    .join('');
                                                tempDiv.innerHTML = testContent;

                                                if (tempDiv.offsetHeight > maxHeight && currentPageParagraphs.length > 0) {
                                                    // Page is full - save it with cleaned content
                                                    const pageContent = currentPageParagraphs.join('\n\n')
                                                        .replace(/\[CONTINUE\]/gi, '[CONTINUE OR INTERACT]');

                                                    state.pages.push({
                                                        content: pageContent,
                                                        type: 'narrative'
                                                    });

                                                    // Lock the display to the first page content
                                                    if (displayPageParagraphs.length === 0) {
                                                        displayPageParagraphs = [...currentPageParagraphs];
                                                    }

                                                    currentPageParagraphs = [completeParagraph];
                                                } else {
                                                    // Still fits on current page
                                                    currentPageParagraphs.push(completeParagraph);
                                                }
                                            }
                                        }

                                        // Keep the last partial paragraph in buffer
                                        paragraphBuffer = parts[parts.length - 1];
                                    }

                                    // Display: if we've locked to first page, show that, otherwise show current content
                                    if (hasShownText && isAtEnd) {
                                        const displayParagraphs = displayPageParagraphs.length > 0
                                            ? displayPageParagraphs
                                            : currentPageParagraphs;

                                        const displayHTML = displayParagraphs
                                            .map(p => `<div class="page-text">${escapeHtml(p)}</div>`)
                                            .join('') +
                                            (paragraphBuffer.trim() ?
                                                `<div class="page-text streaming">${escapeHtml(paragraphBuffer)}</div>` :
                                                '');

                                        elements.pageContent.innerHTML = displayHTML;
                                        elements.pageContent.scrollTop = 0;
                                    }
                                }
                            } catch (e) {
                                console.error('JSON parse error:', e);
                            }
                        }
                    }
                }

                // Clean up temp div
                document.body.removeChild(tempDiv);

                // Clean full text BEFORE creating pages
                const cleanedText = fullText
                    .replace(/\[DEATH:[^\]]+\]/g, '')
                    .replace(/\[CHAPTER_COMPLETE:\s*\d+\]/g, '')
                    .replace(/\[STORY_COMPLETE\]/g, '')
                    .replace(/\[CONTINUE\]/gi, '[CONTINUE OR INTERACT]')
                    .trim();

                // Handle any remaining text in buffer as final paragraph
                if (paragraphBuffer.trim() && hasShownText) {
                    const finalParagraph = paragraphBuffer.trim();
                    currentPageParagraphs.push(finalParagraph);
                }

                // Apply cleaning to current page paragraphs
                const cleanedPageContent = currentPageParagraphs.join('\n\n')
                    .replace(/\[CONTINUE\]/gi, '[CONTINUE OR INTERACT]');

                // Save final page if there's content
                if (currentPageParagraphs.length > 0) {
                    state.pages.push({
                        content: cleanedPageContent,
                        type: 'narrative'
                    });
                }

                checkForChapterComplete(fullText);

                state.conversationHistory.push({
                    role: 'assistant',
                    content: cleanedText
                });

                // Position user at first new page
                if (startingPageCount === 0 && state.pages.length > 0) {
                    state.currentPageIndex = 0;
                } else if (isAtEnd && state.pages.length > startingPageCount) {
                    state.currentPageIndex = startingPageCount;
                }

                displayCurrentPage();
                updateUI();
            } catch (error) {
                console.error('processResponse error:', error);
                console.error('Stack:', error.stack);
                throw error; // Re-throw to be caught by sendMessage
            }
        }

        function buildSystemPrompt() {
            return STORY_DATA.getSystemPrompt(state.currentChapter);
        }

        function checkForChapterComplete(text) {
            if (text.includes('[STORY_COMPLETE]')) {
                state.storyComplete = true;
                addPage('--- The End ---\n\nThank you for experiencing this story.', 'narrative');
                return;
            }

            const match = text.match(/\[CHAPTER_COMPLETE:\s*(\d+)\]/);
            if (match) {
                const nextChapter = parseInt(match[1]);
                if (nextChapter <= STORY_DATA.chapters.length) {
                    state.currentChapter = nextChapter;
                    const chapter = STORY_DATA.chapters[nextChapter - 1];
                    addPage(`\n--- Chapter ${chapter.number}: ${chapter.title} ---\n${chapter.description}\n`, 'narrative');
                    updateChapterDisplay();
                }
            }
        }

        // ===== UI UPDATES =====
        function updateUI() {
            // Check if we're at the end of all pages
            const isAtEnd = state.currentPageIndex >= state.pages.length - 1;

            // Update page navigation buttons
            elements.prevPageBtn.disabled = state.currentPageIndex === 0;
            // Keep Next Page enabled when at end (it will trigger Continue Story)
            elements.nextPageBtn.disabled = state.isProcessing || state.storyComplete;

            // Update page info
            elements.pageInfo.textContent = `Page ${state.currentPageIndex + 1} of ${state.pages.length}`;

            // Only allow interaction when at the end of the story
            elements.interactBtn.disabled = state.isProcessing || !isAtEnd;
            elements.continueStoryBtn.disabled = state.isProcessing || state.storyComplete || !isAtEnd;
            elements.submitBtn.disabled = state.isProcessing;

            updateChapterDisplay();
        }

        function updateChapterDisplay() {
            const chapter = STORY_DATA.chapters[state.currentChapter - 1];
            if (chapter) {
                elements.chapterInfo.textContent = `Chapter ${chapter.number}: ${chapter.title}`;
            }
        }

        // ===== PERSISTENCE =====
        function saveState() {
            const saveData = {
                pages: state.pages,
                currentPageIndex: state.currentPageIndex,
                conversationHistory: state.conversationHistory,
                currentChapter: state.currentChapter,
                storyStarted: state.storyStarted,
                storyComplete: state.storyComplete
            };
            localStorage.setItem('interactiveStoryPaginated', JSON.stringify(saveData));
        }

        function loadState() {
            const saved = localStorage.getItem('interactiveStoryPaginated');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    state.pages = data.pages || [];
                    state.currentPageIndex = data.currentPageIndex || 0;
                    state.conversationHistory = data.conversationHistory || [];
                    state.currentChapter = data.currentChapter || 1;
                    state.storyStarted = data.storyStarted || false;
                    state.storyComplete = data.storyComplete || false;
                } catch (e) {
                    console.error('Error loading saved state:', e);
                }
            }
        }

        function resetStory() {
            if (confirm('Are you sure you want to reset the story? All progress will be lost.')) {
                localStorage.removeItem('interactiveStoryPaginated');
                location.reload();
            }
        }

        // ===== UTILITIES =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start the application
        init();
    </script>
